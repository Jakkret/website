# .github/workflows/update-commits.yml
name: Update commits

on:
  push:
    branches: [main]
    
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate docs/commits.html
        run: |
          echo "<table border='0' cellpadding='4' cellspacing='0' width='100%'>" > docs/commits.html
          git log -5 --pretty=format:"<tr><td class='txt' style='font-family: Arial, Verdana, sans-serif; font-size:10px; border-bottom:1px solid #eee;'><span style='color:#999;'>Website - %ad</span><br><a href='https://github.com/Jakkret/website/commit/%H' class='more1'>%s</a></td></tr>" --date=short >> docs/commits.html
          echo "</table>" >> docs/commits.html
      
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/commits.html
          git commit -m "Auto: update commits" || exit 0
          git push